# Pipeline de Integração Contínua do TaskFlow
# Executa em todo push e pull request na branch main:
#   1. Lint (flake8) — validação da qualidade do código
#   2. Testes automatizados (pytest) — validação do comportamento
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  qualidade-e-testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Validar qualidade do código (flake8)
        run: flake8 src tests --max-line-length=100

      - name: Executar testes automatizados (pytest)
        run: pytest tests -v
